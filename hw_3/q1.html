<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul id="ul">
        <li>p1</li>
        <li>p2</li>
        <li>p3</li>
    </ul>
    <script>
        const ul=document.getElementById("ul")
        const li=document.createElement("li")
        li.textContent="p4"
        ul.append(li)
    </script>
</body>
</html>
